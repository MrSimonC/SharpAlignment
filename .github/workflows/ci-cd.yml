name: ✔ Test

on:
  push:
    tags: ["**"]
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  sharpalignment:
    name: 🟣 .NET Tool
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v6

      - name: 🟣 Setup .NET
        uses: actions/setup-dotnet@v5

      - name: 🛠️ Build
        run: >
          dotnet build 
          --configuration Release

      - name: ✔ Test
        run: >
          dotnet test
          --configuration Release
          --no-build

      - name: 📦️ Pack .NET tool
        run: >
          dotnet pack
          --output ./
          ./SharpAlignment.Console/SharpAlignment.Console.csproj

      - name: 📤 Upload NUPKG artifact
        uses: actions/upload-artifact@v7
        with:
          name: sharpalignment
          path: src/*.nupkg
          if-no-files-found: error
          retention-days: 1

      - name: 📦 Publish self-contained Linux binary
        run: >
          dotnet publish
          ./SharpAlignment.Console/SharpAlignment.Console.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/publish/linux-x64

      - name: 📦 Publish self-contained Windows binary
        run: >
          dotnet publish
          ./SharpAlignment.Console/SharpAlignment.Console.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/publish/win-x64

      - name: 📤 Upload self-contained binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: sharpalignment-self-contained
          path: |
            artifacts/publish/linux-x64/sharpalignment
            artifacts/publish/win-x64/sharpalignment.exe
          if-no-files-found: error
          retention-days: 1

  release-sync:
    name: ✨ Release Sync
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      created-src: ${{ steps.release.outputs.src--release_created }}
    steps:
      - name: ✨ Create/Update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-config.json
          manifest-file: release-manifest.json
